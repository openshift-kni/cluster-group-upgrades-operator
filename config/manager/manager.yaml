apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/name: talm-operator
    app.kubernetes.io/component: talm
    control-plane: controller-manager
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager-v2
  namespace: system
  labels:
    app.kubernetes.io/name: talm-operator
    app.kubernetes.io/component: talm
    control-plane: controller-manager
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: talm-operator
      app.kubernetes.io/component: talm
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: talm-operator
        app.kubernetes.io/component: talm
        control-plane: controller-manager
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - command:
        - /manager
        args:
        - --leader-elect
        - --metrics-bind-address=:6443
        - --metrics-tls-cert-dir=/etc/tls/private
        image: controller:latest
        name: manager
        env:
        - name: GOCOVERDIR
          value: /coverage
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 6443
          protocol: TCP
          name: https
        volumeMounts:
        - name: coverage
          mountPath: /coverage
        - mountPath: /etc/tls/private
          name: metrics-serving-cert
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 20Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: coverage
        emptyDir: {}
      - name: metrics-serving-cert
        secret:
          secretName: talm-metrics-serving-cert
