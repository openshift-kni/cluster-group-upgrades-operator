---
version: "2"

linters:
  enable:
    - goconst
    - gocritic
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unparam
    - gocyclo
    - unused
  disable:
    - depguard  # Disabled due to v2 configuration changes causing false positives
    - revive    # Disabled to ignore documentation and unused parameter warnings
  exclusions:
    generated: lax

formatters:
  enable:
    - gofmt
    - goimports

settings:
  linters:
    gocritic:
      settings:
        enabled-checks:
          # Diagnostic (keeping only non-default ones)
          - commentedOutCode
          - nilValReturn
          - weakCond
          - octalLiteral
          - sloppyReassign
          # Performance
          - equalFold
          - indexAlloc
          - rangeExprCopy
          - appendCombine
          # Style (keeping only non-default ones)
          - boolExprSimplify
          - commentedOutImport
          - docStub
          - emptyFallthrough
          - emptyStringTest
          - hexLiteral
          - methodExprCall
          - stringXbytes
          - typeAssertChain
          - unlabelStmt
          - yodaStyleExpr
          # Opinionated
          - initClause
          - nestingReduce
          - ptrToRefParam
          - typeUnparen
          - unnecessaryBlock
          - paramTypeCombine        

    revive:
      settings:
        rules:
          - name: if-return
            disabled: true
          - name: unused-parameter
            disabled: true
          - name: exported
            disabled: true
          - name: package-comments
            disabled: true
run:
  concurrency: 6
  timeout: 5m
  tests: false

issues:
  exclude-rules:
    # Exclude unused warning for compareBackupToDisk - it's used in Linux-only code
    - path: recovery/cmd/backup_size.go
      linters:
        - unused
      text: "compareBackupToDisk"